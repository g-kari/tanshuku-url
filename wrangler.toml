name = "tanshuku-url"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./frontend/dist"
binding = "ASSETS"

[[kv_namespaces]]
binding = "URL_CACHE"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_KV_ID"
preview_id = "REPLACE_WITH_SESSIONS_KV_PREVIEW_ID"

[[d1_databases]]
binding = "DB"
database_name = "tanshuku-db"
database_id = "REPLACE_WITH_D1_ID"

[vars]
SHORT_DOMAIN = "https://your-domain.workers.dev"
OIDC_ISSUER = "https://id.0g0.xyz"

# Secretsはwrangler secret putで設定:
# GOOGLE_SAFE_BROWSING_API_KEY
# OIDC_CLIENT_ID
# OIDC_CLIENT_SECRET
